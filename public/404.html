<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MerakAi — Page not found</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;1,500&family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .err-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 32px;
    }
    .err-card {
      max-width: 560px;
      text-align: center;
    }
    .err-code {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 96px;
      font-weight: 400;
      letter-spacing: -0.04em;
      color: var(--blue-bright);
      line-height: 1;
      margin-bottom: 24px;
    }
    .err-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 16px;
    }
    .err-body {
      color: var(--text-soft);
      font-weight: 300;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>
  <div class="err-wrap">
    <div class="err-card">
      <div class="err-code">404</div>
      <h1 class="err-headline">This page hasn't been read into the case yet.</h1>
      <p class="err-body">Whatever you were looking for isn't here. Return to the home page and we'll point you in the right direction.</p>
      <a href="/" class="btn btn-primary btn-hero">Take me home</a>
    </div>
  </div>
</body>
</html>
